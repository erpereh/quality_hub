<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convertidor de Delimitadores - Quality Solutions</title>
    <link rel="stylesheet" href="/tools/converter/styles.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <a href="/" class="btn-back">← Volver al Menú Principal</a>
        
        <h1>Convertidor de Delimitadores</h1>
        <p>Soluciones de Calidad para tu Negocio</p>
    </header>

    <div class="container">
        <!-- Configuración Principal -->
        <section class="config-section">
            <h3>Configuración de Conversión</h3>
            <div class="config-grid">
                <div class="config-group">
                    <label for="original-delimiter">Delimitador Original</label>
                    <select id="original-delimiter">
                        <option value=";">Punto y coma (;)</option>
                        <option value=",">Coma (,)</option>
                        <option value="\t">Tabulador</option>
                        <option value=" ">Espacio</option>
                        <option value="|">Barra vertical (|)</option>
                        <option value="custom">Personalizado</option>
                    </select>
                </div>
                <div class="config-group" id="custom-original-container" style="display: none;">
                    <label for="custom-original">Delimitador Original Personalizado</label>
                    <input type="text" id="custom-original" placeholder="Ej: ; o | o tab">
                </div>
                <div class="config-group">
                    <label for="new-delimiter">Nuevo Delimitador</label>
                    <input type="text" id="new-delimiter" value="#" placeholder="Ej: # o ; o ,">
                </div>
                <div class="config-group">
                    <label for="conversion-type">Tipo de Conversión</label>
                    <select id="conversion-type">
                        <option value="replace">Reemplazar delimitador</option>
                        <option value="add">Añadir nuevo delimitador</option>
                        <option value="remove">Eliminar delimitador original</option>
                    </select>
                </div>
            </div>
        </section>

        <!-- Área de Carga -->
        <section>
            <div class="dropzone" id="dropzone">
                <span class="dropzone-icon">📁</span>
                <h3>Arrastra y suelta tu archivo aquí</h3>
                <p>o haz clic para seleccionar</p>
                <input type="file" id="file-input" accept=".csv,.txt,.tsv,.xlsx,.xls">
            </div>
        </section>

        <!-- Acción Principal -->
        <section class="action-buttons">
            <button class="btn-primary" id="convert-btn" disabled>Convertir Archivo</button>
            <div class="download-section">
                <span class="download-label">Descargar como:</span>
                <div class="format-buttons">
                    <button class="format-btn" data-format="csv">CSV</button>
                    <button class="format-btn" data-format="txt">TXT</button>
                    <button class="format-btn" data-format="tsv">TSV</button>
                </div>
            </div>
            <button class="btn-danger" id="clear-btn">Limpiar Todo</button>
        </section>


        <!-- Resultado -->
        <section class="result-section" id="result-section">
            <div class="result-header">
                <div class="result-title">Contenido Convertido</div>
                <div class="stats">
                    <span class="stat-item" id="lines-count">0 líneas</span>
                    <span class="stat-item" id="replacements-count">0 reemplazos</span>
                </div>
            </div>
            <div class="result-content" id="result-content"></div>
        </section>
    </div>

    <script src="/tools/converter/script.js"></script>
</body>
</html>
